kind = "web"
previewPath = "/"
title = "SignalOS"
version = "1.0.0"
id = "artifacts/signalos"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 19427

[services.development]
run = "pnpm --filter @workspace/signalos run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/signalos", "run", "build" ]
publicDir = "artifacts/signalos/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "19427"
BASE_PATH = "/"
